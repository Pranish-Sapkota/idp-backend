# render.yaml
services:
  - type: web
    name: idp-system-backend
    runtime: python
    region: oregon
    plan: free
    pythonVersion: "3.12.10"

    buildCommand: pip install -r requirements.txt

    # sh -c ensures $PORT is shell-expanded before uvicorn receives it
    startCommand: sh -c 'uvicorn main:app --host 0.0.0.0 --port $PORT'

    healthCheckPath: /api/v1/health

    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_FILE_SIZE_MB
        value: "20"
